name: Push placeholder image
on:
  workflow_dispatch:
    inputs:
      service_name:
        required: true
        type: string
jobs:
  push-placeholder:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push FastAPI placeholder
        run: |
          cat << 'MAIN' > main.py
          from fastapi import FastAPI
          app = FastAPI()
          @app.get("/")
          def root(): return {"status": "ok"}
          @app.get("/health")
          def health(): return {"status": "healthy"}
          MAIN
          cat << 'DOCK' > Dockerfile
          FROM python:3.12-slim
          WORKDIR /app
          RUN pip install fastapi uvicorn --no-cache-dir
          COPY main.py .
          EXPOSE 8000
          CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
          DOCK
          docker build -t placeholder .
          docker tag placeholder \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/retail/${{ inputs.service_name }}:latest
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/retail/${{ inputs.service_name }}:latest
