AWSTemplateFormatVersion: "2010-09-09"
Description: RetailAI LDC Platform - Base Infrastructure

Resources:

  RetailTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: retail-platform
      BillingMode: PAY_PER_REQUEST
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  RetailEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: retail-events

  AppRunnerInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: retail-apprunner-instance-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: tasks.apprunner.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RetailDynamoAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchWriteItem
                Resource:
                  - !GetAtt RetailTable.Arn
                  - !Sub "${RetailTable.Arn}/index/*"
        - PolicyName: RetailEventBridgeAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: events:PutEvents
                Resource: !GetAtt RetailEventBus.Arn

  AppRunnerAccessRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: retail-apprunner-access-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: build.apprunner.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess

Outputs:
  TableArn:
    Value: !GetAtt RetailTable.Arn
  InstanceRoleArn:
    Value: !GetAtt AppRunnerInstanceRole.Arn
  AccessRoleArn:
    Value: !GetAtt AppRunnerAccessRole.Arn
